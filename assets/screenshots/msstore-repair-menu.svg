<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="MSStore Repair recovery menu screenshot">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06131a"/>
      <stop offset="1" stop-color="#0b2633"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="#0f172a"/>
  <rect x="70" y="58" width="1140" height="644" rx="18" fill="#020617" filter="url(#shadow)"/>
  <rect x="70" y="58" width="1140" height="52" rx="18" fill="#111827"/>
  <circle cx="104" cy="84" r="8" fill="#ef4444"/>
  <circle cx="130" cy="84" r="8" fill="#f59e0b"/>
  <circle cx="156" cy="84" r="8" fill="#22c55e"/>
  <text x="640" y="91" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="17" fill="#cbd5e1">Administrator: Store Recovery Center</text>
  <rect x="98" y="134" width="1084" height="534" rx="10" fill="url(#screen)" stroke="#1e3a4a"/>
  <text x="142" y="178" font-family="Consolas, Monaco, monospace" font-size="22" fill="#67e8f9">============================================================================</text>
  <text x="640" y="216" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="28" font-weight="700" fill="#e0f2fe">STORE RECOVERY CENTER</text>
  <text x="142" y="252" font-family="Consolas, Monaco, monospace" font-size="22" fill="#67e8f9">============================================================================</text>
  <text x="170" y="304" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">Microsoft Store repair utility for Windows.</text>
  <text x="170" y="336" font-family="Consolas, Monaco, monospace" font-size="22" fill="#94a3b8">Made by Mizae.</text>
  <text x="142" y="392" font-family="Consolas, Monaco, monospace" font-size="22" fill="#38bdf8">----------------------------------------------------------------------------</text>
  <text x="170" y="428" font-family="Consolas, Monaco, monospace" font-size="22" font-weight="700" fill="#e0f2fe">RECOVERY MODES</text>
  <text x="142" y="464" font-family="Consolas, Monaco, monospace" font-size="22" fill="#38bdf8">----------------------------------------------------------------------------</text>
  <text x="178" y="510" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">[1] SOFT RECOVERY</text>
  <text x="220" y="542" font-family="Consolas, Monaco, monospace" font-size="20" fill="#94a3b8">Resets Store cache, starts required services, and performs light repair.</text>
  <text x="178" y="584" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">[2] DEFAULT RECOVERY</text>
  <text x="220" y="616" font-family="Consolas, Monaco, monospace" font-size="20" fill="#94a3b8">Soft recovery plus BITS, Delivery Optimization, App Installer, and Store repair.</text>
  <text x="178" y="658" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">[3] HARD RECOVERY</text>
  <text x="220" y="690" font-family="Consolas, Monaco, monospace" font-size="20" fill="#94a3b8">Default recovery plus Windows Update cache reset, DISM, SFC, Winsock, and DNS.</text>
</svg>
