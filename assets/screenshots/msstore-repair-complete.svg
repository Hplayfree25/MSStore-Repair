<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-label="MSStore Repair recovery complete screenshot">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07140f"/>
      <stop offset="1" stop-color="#082f25"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="#111827"/>
  <rect x="70" y="58" width="1140" height="644" rx="18" fill="#020617" filter="url(#shadow)"/>
  <rect x="70" y="58" width="1140" height="52" rx="18" fill="#111827"/>
  <circle cx="104" cy="84" r="8" fill="#ef4444"/>
  <circle cx="130" cy="84" r="8" fill="#f59e0b"/>
  <circle cx="156" cy="84" r="8" fill="#22c55e"/>
  <text x="640" y="91" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="17" fill="#cbd5e1">Administrator: Store Recovery Center</text>
  <rect x="98" y="134" width="1084" height="534" rx="10" fill="url(#screen)" stroke="#14532d"/>
  <text x="142" y="186" font-family="Consolas, Monaco, monospace" font-size="22" fill="#86efac">============================================================================</text>
  <text x="640" y="226" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="30" font-weight="700" fill="#dcfce7">RECOVERY DONE</text>
  <text x="640" y="264" text-anchor="middle" font-family="Consolas, Monaco, monospace" font-size="22" fill="#bbf7d0">Made by Mizae</text>
  <text x="142" y="302" font-family="Consolas, Monaco, monospace" font-size="22" fill="#86efac">============================================================================</text>
  <text x="178" y="364" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">Completed mode : DEFAULT</text>
  <text x="178" y="404" font-family="Consolas, Monaco, monospace" font-size="22" fill="#f8fafc">Log file       : %USERPROFILE%\Desktop\MicrosoftStoreRecovery.log</text>
  <text x="178" y="472" font-family="Consolas, Monaco, monospace" font-size="22" font-weight="700" fill="#dcfce7">Recommended next steps:</text>
  <text x="220" y="516" font-family="Consolas, Monaco, monospace" font-size="21" fill="#f8fafc">1. Restart your PC.</text>
  <text x="220" y="552" font-family="Consolas, Monaco, monospace" font-size="21" fill="#f8fafc">2. Open Microsoft Store.</text>
  <text x="220" y="588" font-family="Consolas, Monaco, monospace" font-size="21" fill="#f8fafc">3. Go to Library.</text>
  <text x="220" y="624" font-family="Consolas, Monaco, monospace" font-size="21" fill="#f8fafc">4. Select Get updates.</text>
  <text x="220" y="660" font-family="Consolas, Monaco, monospace" font-size="21" fill="#f8fafc">5. Try the failed installation or update again.</text>
</svg>
